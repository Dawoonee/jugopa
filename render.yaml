# Render Blueprint — Jugopa 백엔드 (Django + Gunicorn) · 무료(Free) 구성
# DB는 Supabase(Postgres) 사용. 미디어는 미사용(USE_S3 미설정 → 파일시스템).
# 데이터는 로컬 PC에서 daily_update 로 최신화 후 Supabase 에 1회 loaddata 로 적재한다.
# (서버에서 loaddata 를 돌리면 무료 512MB 에서 OOM/멈춤 → 빌드에서 제거)
#
# [무료 구성 메모]
#  - web 은 plan: free (15분 미사용 시 sleep, 다음 요청 때 30~60초 후 깨어남 — 시연엔 충분)
#  - torch/transformers 는 배포 백엔드에서 불필요(daily_update 는 로컬에서만 실행) → requirements-prod.txt 사용
#  - 시드/일배치(loaddata, daily_update)는 서버에서 돌리지 않는다.

services:
  # ── 웹 API 서비스 ────────────────────────────────────────────────
  - type: web
    name: jugopa-backend
    runtime: python
    plan: free
    rootDir: backend
    # ML 패키지(torch 등) 제외한 경량 requirements 로 빌드 → 무료 빌드 시간/디스크 초과 방지.
    # 데이터는 Supabase 에 이미 적재돼 있으므로 loaddata 없음. migrate 는 idempotent.
    buildCommand: "pip install -r requirements-prod.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    # Render 가 주입하는 $PORT 에 바인딩. 무료 0.1 CPU/512MB 고려해 워커 2개로 제한.
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # 데이터베이스 (Supabase) — Session Pooler URI 권장 (IPv4, Render 연결용)
      # 형식: postgresql://postgres.<ref>:<pw>@aws-0-ap-northeast-2.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false
      # 호스트/오리진 — 실제 도메인으로 채울 것 (콤마 구분)
      - key: ALLOWED_HOSTS
        sync: false   # 예: jugopa-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false   # 예: https://jugopa-backend.onrender.com,https://jugopa.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # 예: https://jugopa.vercel.app
      # 외부 API 키 (챗봇 런타임 사용 시)
      - key: FINANCIAL_API_KEY
        sync: false
      - key: GMS_API_KEY
        sync: false
      - key: GMS_BASE_URL
        sync: false
      - key: GMS_MODEL
        value: gpt-5-nano
      - key: GMS_API_KEY2
        sync: false
      - key: GMS_BASE_URL2
        sync: false
      - key: GMS_MODEL2
        value: gpt-5-nano
